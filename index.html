<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP记录</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 115vh;
            margin: 0;
            background-color: #87CEEB;
            overflow: hidden;
            position: relative;
        }

        .watermark {
            position: absolute;
            font-size: 1em;
            color: rgba(255, 255, 255, 0.3);
            transform: rotate(-45deg);
            pointer-events: none;
            z-index: 1;
        }

        .watermark:nth-child(1) { top: 20px; left: 20px; }
        .watermark:nth-child(2) { top: 50px; left: 150px; }
        .watermark:nth-child(3) { top: 80px; left: 300px; }
        .watermark:nth-child(4) { top: 150px; left: 100px; }
        .watermark:nth-child(5) { top: 200px; left: 250px; }
        .watermark:nth-child(6) { top: 250px; left: 20px; }
        .watermark:nth-child(7) { top: 300px; left: 200px; }
        .watermark:nth-child(8) { top: 350px; left: 350px; }

        .login-container, .success-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            transform: translateY(-50px);
            opacity: 0;
            animation: fadeIn 1s forwards, slideDown 1s forwards;
            z-index: 2;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            to {
                transform: translateY(0);
            }
        }

        .login-title, .success-title {
            font-size: 2em;
            margin-bottom: 20px;
            color: #008cba;
        }

        .login-button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #008cba;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }

        .login-button:hover {
            background-color: #005f5f;
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .success-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 1s forwards;
            width: 80%; /* 调整宽度 */
            padding: 20px; /* 调整内边距 */
        }

        .success-title {
            font-size: 1.5em; /* 调整字体大小 */
            margin-bottom: 15px; /* 调整底部外边距 */
        }

        .success-message {
            color: green;
            display: none;
            font-size: 1em;
        }

        .gradient-button {
            background: linear-gradient(90deg, #008cba, #00bfa5, #008cba);
            background-size: 300% 300%;
            width: 100%;
            padding: 10px;
            font-size: 1em;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-position 0.5s, transform 0.3s;
            margin-top: 10px; /* 调整顶部外边距 */
        }

        .gradient-button:hover {
            background-position: right center;
        }

        .gradient-button:active {
            transform: scale(0.98);
        }

        .game-container {
            margin-top: 15px; /* 调整顶部外边距 */
            width: 280px; /* 调整宽度 */
            height: 180px; /* 调整高度 */
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-iframe {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="watermark">heyuxuan</div>
    <div class="watermark">www.xrayhttp.top</div>
    <div class="watermark">heyuxuan</div>
    <div class="watermark">www.xrayhttp.top</div>
    <div class="watermark">heyuxuan</div>
    <div class="watermark">www.xrayhttp.top</div>
    <div class="watermark">heyuxuan</div>
    <div class="watermark">www.xrayhttp.top</div>

    <div class="login-container">
        <button class="login-button" onclick="showSuccess()">点击加载(～￣▽￣)～</button>
    </div>

    <div class="success-container" id="success-container">
        <h1 class="success-title">222.189.239.32</br>administrator</br>RDP:40255<br>MCSM:40256<br>宝塔:40258</h1>
        <p class="success-message">您已成功登录。</p>
        <button class="gradient-button" onclick="goToURL()">融珂之悦云</button>
        <button class="gradient-button" onclick="goToURL1()">StarEra官网</button>
        <button class="gradient-button" onclick="goToURL2()">紫南</button>
        <div class="game-container">
            <iframe src="game.html" class="game-iframe" frameborder="0"></iframe>
        </div>
    </div>

    <script>
        function showSuccess() {
            const loginContainer = document.querySelector('.login-container');
            const successContainer = document.getElementById('success-container');
            loginContainer.style.display = 'none';
            successContainer.style.display = 'flex';
        }

        function goToURL() {

        }
        function goToURL1() {

        }
        function goToURL2() {

        }
    </script>
</body>
</html>
