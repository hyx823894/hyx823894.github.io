<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>简单移动游戏</title>
<style>
  body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; background: #ccc; }
  #gameCanvas { background: #eee; display: block; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="280" height="180"></canvas>

<script>
// 获取canvas元素和绘图上下文
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 游戏角色
const hero = {
  x: 50,
  y: 50,
  width: 50,
  height: 50,
  color: '#008cba', // 主题颜色
  speed: 2,
  directionX: 1,
  directionY: 1
};

// 游戏循环
function gameLoop() {
  // 清除画布
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 绘制角色
  ctx.fillStyle = hero.color;
  ctx.fillRect(hero.x, hero.y, hero.width, hero.height);

  // 更新角色位置
  moveHero();

  // 请求下一帧动画
  requestAnimationFrame(gameLoop);
}

// 移动角色的函数
function moveHero() {
  hero.x += hero.speed * hero.directionX;
  hero.y += hero.speed * hero.directionY;

  // 如果角色碰到边界，改变方向
  if (hero.x < 0 || hero.x + hero.width > canvas.width) {
    hero.directionX *= -1;
  }
  if (hero.y < 0 || hero.y + hero.height > canvas.height) {
    hero.directionY *= -1;
  }
}

gameLoop();
</script>
</body>
</html>
