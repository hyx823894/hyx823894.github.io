<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP记录</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #87CEEB;
            overflow: hidden;
        }

        .watermark {
            position: absolute;
            font-size: 1em;
            color: rgba(255, 255, 255, 0.3);
            transform: rotate(-45deg);
            pointer-events: none;
            z-index: 1;
        }

        .watermark:nth-child(1) { top: 20px; left: 20px; }
        .watermark:nth-child(2) { top: 50px; left: 150px; }
        .watermark:nth-child(3) { top: 80px; left: 300px; }
        .watermark:nth-child(4) { top: 150px; left: 100px; }
        .watermark:nth-child(5) { top: 200px; left: 250px; }
        .watermark:nth-child(6) { top: 250px; left: 20px; }
        .watermark:nth-child(7) { top: 300px; left: 200px; }
        .watermark:nth-child(8) { top: 350px; left: 350px; }

        .login-container, .success-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s forwards, slideDown 1s forwards;
            z-index: 2;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            to {
                transform: translateY(0);
            }
        }

        .login-title, .success-title {
            font-size: 2em;
            margin-bottom: 20px;
            color: #008cba;
        }

        .login-button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #008cba;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }

        .login-button:hover {
            background-color: #005f5f;
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .success-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 1s forwards;
            width: 90%; /* 调整宽度 */
            padding: 20px; /* 调整内边距 */
        }

        .success-title {
            font-size: 1.5em; /* 调整字体大小 */
            margin-bottom: 15px; /* 调整底部外边距 */
        }

        .success-message {
            color: green;
            display: none;
            font-size: 1em;
        }

        .gradient-button {
            background: linear-gradient(90deg, #008cba, #00bfa5, #008cba);
            background-size: 300% 300%;
            width: 100%;
            padding: 10px;
            font-size: 1em;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-position 0.5s, transform 0.3s;
            margin-top: 10px; /* 调整顶部外边距 */
        }

        .gradient-button:hover {
            background-position: right center;
        }

        .gradient-button:active {
            transform: scale(0.98);
        }

        .animation-container {
            width: 100%;
            height: 50px;
            overflow: hidden;
            position: relative;
            background-color: #87CEEB;
            margin-top: 20px;
        }

        .moving-block {
            width: 50px;
            height: 50px;
            background-color: #008cba;
            position: absolute;
            animation: moveBlock 3s linear infinite;
        }

        @keyframes moveBlock {
            0% { left: 0; }
            50% { left: calc(100% - 50px); }
            100% { left: 0; }
        }

        @media (max-width: 768px) {
            .login-container, .success-container {
                width: 90%;
                padding: 20px;
            }

            .login-title, .success-title {
                font-size: 1.5em;
            }

            .login-button, .gradient-button {
                padding: 10px;
                font-size: 1em;
            }
            .info-message {
            font-size: 1.2em;
            color: #008cba;
            margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="watermark">heyuxuan</div>
    <div class="watermark">www.xrayhttp.top</div>
    <div class="watermark">heyuxuan</div>
    <div class="watermark">www.xrayhttp.top</div>
    <div class="watermark">heyuxuan</div>
    <div class="watermark">www.xrayhttp.top</div>
    <div class="watermark">heyuxuan</div>
    <div class="watermark">www.xrayhttp.top</div>

    <div class="login-container">
        <button class="login-button" onclick="showSuccess()">点击加载</button>
    </div>

    <div class="success-container" id="success-container">
        <h1 class="success-title">Administrator</h1>
        <button class="gradient-button" onclick="goToURL()">融珂之悦云</button>
        <button class="gradient-button" onclick="goToURL1()">StarEra官网</button>
        <button class="gradient-button" onclick="goToURL2()">紫南主页</button>
        <button class="gradient-button" onclick="goToURL3()">MCSM面板</button>
        <button class="gradient-button" onclick="goToURL4()">宝塔面板</button>
        <button class="gradient-button" onclick="goToURL5()">测试网站</button>
        <button class="gradient-button" onclick="showInfo()">下载本网站源码</button>
    <p class="info-message" id="infoMessage" style="display: none;">乐，你还真信啊</p>
        <div class="animation-container">
            <div class="moving-block"></div>
        </div>
    </div>

    <script>
        function showInfo() {
            var infoMessage = document.getElementById('infoMessage');
            infoMessage.style.display = 'block';
        }
        function showSuccess() {
            const loginContainer = document.querySelector('.login-container');
            const successContainer = document.getElementById('success-container');
            loginContainer.style.display = 'none';
            successContainer.style.display = 'flex';
        }

        function goToURL() {
            window.open('https://cloud.yghpy.com/login', '_blank');
        }
        function goToURL1() {
            window.open('https://www.mc363.top', '_blank');
        }
        function goToURL2() {
            window.open('https://www.520mc.top', '_blank');
        }
        function goToURL3() {
            window.open('http://222.187.239.32:40256', '_blank');
        }
        function goToURL4() {
            window.open('http://222.187.239.32:40258/he', '_blank');
        }
        function goToURL5() {
            window.open('http://222.187.239.32:40253', '_blank');
        }
    </script>
</body>
</html>
